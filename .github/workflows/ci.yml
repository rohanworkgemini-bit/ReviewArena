# CI — type-check + Python syntax check on every PR.
#
# Does NOT deploy. Deploy workflows live in deploy-*.yml and only fire
# on pushes to main. This file's job is to gate PRs: a red check here
# means the PR can't be merged.
#
# Fast (~2 min) — pnpm + python install are cached.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Two pushes in quick succession: cancel the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-node:
    name: typecheck (apps/api + apps/web + shared-types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the pnpm version from package.json's packageManager field
      # (currently pnpm@9.7.1) — keeps a single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build shared-types (api + web depend on it)
        run: pnpm --filter @reviewarena/shared-types build

      - name: Typecheck apps/api
        run: pnpm --filter @reviewarena/api exec tsc --noEmit

      - name: Typecheck apps/web
        run: pnpm --filter @reviewarena/web exec tsc --noEmit

  python-syntax:
    name: Python AST + import check (services/review-gen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/review-gen/requirements.txt

      - name: Install review-gen deps
        working-directory: services/review-gen
        # Use pip's cache (no --no-cache-dir) so the cache: pip step in
        # setup-python above can actually save it. With --no-cache-dir,
        # the cache folder never gets created and the post-job step
        # errors trying to upload a missing folder.
        run: pip install -r requirements.txt

      - name: AST parse every .py file (catches syntax errors)
        working-directory: services/review-gen
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path("app").rglob("*.py"):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f"{p}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"OK ({sum(1 for _ in pathlib.Path('app').rglob('*.py'))} files)")
          PY

      - name: Smoke-import the adapter registry
        working-directory: services/review-gen
        run: python -c "import sys; sys.path.insert(0, '.'); from app import adapters; print('registered:', adapters.known_keys())"
